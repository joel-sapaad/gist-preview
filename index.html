<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gist Preview</title>

  <!-- 1. Capture the app's base BEFORE the restore step rewrites the URL.
          index.html is only ever served at the app root, so its pathname IS
          the base path — works for project pages, user pages and custom
          domains alike, with no hardcoded repo name. -->
  <script>
    window.__APP_BASE__ = location.origin + location.pathname;
  </script>

  <!-- 2. Assets are referenced (and app.js deferred) here, while the URL is
          still the base — so they resolve/fetch correctly even after the
          restore step below changes the URL. -->
  <link rel="stylesheet" href="./style.css" />
  <script src="./app.js" defer></script>

  <!-- 3. Restore the clean path that 404.html encoded into "?/...". Runs during
          parse (before the deferred app.js executes). -->
  <script>
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search.slice(1).split("&").map(function (s) {
          return s.replace(/~and~/g, "&");
        }).join("?");
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })(window.location);
  </script>
</head>
<body>
  <header id="bar">
    <a id="brand" href="./">⚡ Gist Preview</a>
    <form id="form">
      <input id="gist-input" type="text" placeholder="Gist ID or URL" autocomplete="off" spellcheck="false" />
      <input id="file-input" type="text" placeholder="file (optional)" autocomplete="off" spellcheck="false" />
      <button type="submit">Preview</button>
    </form>
    <a id="raw-link" href="#" target="_blank" rel="noopener" hidden>view on gist ↗</a>
  </header>

  <main id="main">
    <section id="landing">
      <h1>⚡ Gist Preview</h1>
      <p>Render any GitHub Gist as a live web page.</p>
      <p class="hint">
        Pass a gist id in the URL:
        <code>/&lt;gist_id&gt;</code>
        or paste one above.
      </p>
      <p class="hint">
        It loads <code>index.html</code> (or the first HTML file) and resolves
        links, scripts, styles and images that reference other files in the gist.
      </p>
    </section>

    <section id="status" hidden></section>

    <iframe id="frame" title="gist preview"
            sandbox="allow-scripts allow-forms allow-popups allow-modals allow-same-origin allow-top-navigation-by-user-activation"
            hidden></iframe>
  </main>
</body>
</html>
