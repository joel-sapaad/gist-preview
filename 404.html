<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gist Preview</title>
  <!--
    GitHub Pages has no server-side routing, so a clean URL like
    /gist-preview/<gist_id> 404s. Pages serves this file for any unmatched
    path; we encode the original path into a query and redirect to the app
    root, where index.html restores the real URL. (spa-github-pages technique.)

    pathSegmentsToKeep = number of leading path segments that are the app's
    base, NOT part of the route. For a project page served at
    https://<user>.github.io/<repo>/ that is 1 (the repo name). For a user/org
    page or custom domain served at the domain root, set it to 0.
  -->
  <script>
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
      l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
      l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
      (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
